<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Karaoke Clipper generated visual">
  <defs>
    <linearGradient id="ubg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="card" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="640" rx="30" fill="url(#ubg)"/>
  <rect x="70" y="60" width="1060" height="520" rx="28" fill="#ffffff" filter="url(#card)"/>
  <rect x="70" y="60" width="1060" height="62" rx="28" fill="#0f172a"/>
  <circle cx="104" cy="92" r="8" fill="#fb7185"/><circle cx="130" cy="92" r="8" fill="#fbbf24"/><circle cx="156" cy="92" r="8" fill="#34d399"/>
  <text x="195" y="99" font-family="Inter, Segoe UI, Arial" font-size="20" font-weight="800" fill="#e5e7eb">karaoke-clipper · Streamlit control panel</text>

  <g transform="translate(105,150)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial" font-size="22" font-weight="800" fill="#0f172a">Input source</text>
    <rect x="0" y="20" width="470" height="48" rx="14" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="18" y="51" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#64748b">https://www.youtube.com/watch?v=&lt;video_id&gt;</text>
    <text x="0" y="104" font-family="Inter, Segoe UI, Arial" font-size="22" font-weight="800" fill="#0f172a">Clip options</text>
    <rect x="0" y="126" width="138" height="40" rx="20" fill="#dbeafe"/><text x="22" y="152" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700" fill="#1d4ed8">720p</text>
    <rect x="154" y="126" width="156" height="40" rx="20" fill="#ede9fe"/><text x="176" y="152" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700" fill="#6d28d9">accurate</text>
    <rect x="326" y="126" width="144" height="40" rx="20" fill="#dcfce7"/><text x="348" y="152" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="700" fill="#15803d">audio clips</text>
    <rect x="0" y="210" width="470" height="160" rx="20" fill="#0f172a"/>
    <path d="M36 288 C70 230, 94 346, 130 288 S190 232, 232 288 S290 344, 332 288 S400 236, 438 288" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round"/>
    <text x="32" y="338" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#94a3b8">Preview candidate timestamps before cutting</text>
  </g>

  <g transform="translate(625,150)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial" font-size="22" font-weight="800" fill="#0f172a">Run summary</text>
    <rect x="0" y="20" width="430" height="92" rx="18" fill="#ecfeff" stroke="#bae6fd"/>
    <text x="22" y="56" font-family="Inter, Segoe UI, Arial" font-size="16" font-weight="800" fill="#155e75">16 clips detected</text>
    <text x="22" y="84" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#0e7490">manifest.csv · manifest.json · logs saved</text>
    <rect x="0" y="140" width="430" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="20" y="176" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#334155">Song 01 · 00:03:12 → 00:06:58 · 0.91</text>
    <rect x="0" y="212" width="430" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="20" y="248" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#334155">Song 02 · 00:09:10 → 00:13:42 · 0.87</text>
    <rect x="0" y="284" width="430" height="56" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="20" y="320" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#334155">Song 03 · 00:18:01 → 00:21:35 · 0.84</text>
    <rect x="0" y="374" width="180" height="48" rx="24" fill="#0f172a"/>
    <text x="35" y="405" font-family="Inter, Segoe UI, Arial" font-size="16" font-weight="800" fill="#ffffff">Launch run</text>
  </g>
</svg>
