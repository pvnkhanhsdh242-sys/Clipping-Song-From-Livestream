name: Smoke Test

on:
  workflow_dispatch:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromaprint-tools

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create synthetic smoke video
        run: |
          mkdir -p tests/assets
          ffmpeg -y -f lavfi -i testsrc=size=1280x720:rate=30 -f lavfi -i sine=frequency=440:sample_rate=16000 -t 30 -c:v libx264 -c:a aac tests/assets/smoke.mp4

      - name: Run pipeline in local mode
        run: |
          python -m app.main --file tests/assets/smoke.mp4 --outdir output-smoke --audio-clips false --use-acoustid false --device cpu

      - name: Verify manifest exists
        run: |
          ls -R output-smoke/manifests
          test -n "$(find output-smoke/manifests -name '*.json' -print -quit)"
